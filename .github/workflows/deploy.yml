name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_full: ${{ steps.lower.outputs.image_full }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Convert image name to lowercase
        id: lower
        run: |
          IMAGE_FULL="${{ env.REGISTRY }}/${{ github.repository_owner }}/culture-quest-backend"
          echo "image_full=${IMAGE_FULL,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.lower.outputs.image_full }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'

    environment:
      name: production
      url: http://${{ vars.SERVER_HOST }}:8080

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_FULL: ${{ needs.build-and-push.outputs.image_full }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: IMAGE_FULL,GH_TOKEN,GH_ACTOR
          script: |
            set -e

            cd ${{ secrets.SERVER_DEPLOY_DIR }}

            echo "==> Fetching latest code and resetting to ${{ github.ref_name }}..."
            git fetch origin
            git reset --hard
            git checkout ${{ github.ref_name }} || git checkout -b ${{ github.ref_name }} origin/${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            echo "==> Logging in to GitHub Container Registry..."
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Determine tag name (latest for main, branch name otherwise)
            export IMAGE_TAG="${{ github.ref_name }}"
            if [ "$IMAGE_TAG" = "main" ]; then
              export IMAGE_TAG="latest"
            fi

            echo "==> Pulling new Docker image: $IMAGE_FULL:$IMAGE_TAG"
            docker pull "$IMAGE_FULL:$IMAGE_TAG"

            echo "==> Recreating backend container..."
            docker compose up -d --no-deps --pull always backend

            echo "==> Cleaning up unused images..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps
