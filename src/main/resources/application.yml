server:
  port: ${PORT}

spring:
  application:
    name: ${APPLICATION_NAME}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-c%20TimeZone=Asia/Ho_Chi_Minh
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI}

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.groq.com/openai}
      chat:
        options:
          model: ${OPENAI_MODEL}
          temperature: 0.2

goong:
  api-key: ${GOONG_API_KEY}
  base-url: ${GOONG_BASE_URL}

keycloak:
  auth-server-url: ${IDP_URL}
  realm: ${REALM}
  admin-realm: ${ADMIN_REALM:${REALM}}
  client-id: ${CLIENT_ID}
  client-secret: ${CLIENT_SECRET}
  admin-client-id: ${ADMIN_CLIENT_ID}
  admin-client-secret: ${ADMIN_CLIENT_SECRET}

app:
  points:
    create-post: 20
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}
    region: ${AWS_REGION}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  return-url: ${PAYOS_RETURN_URL:http://localhost:3000/payment/result}
  cancel-url: ${PAYOS_CANCEL_URL:http://localhost:3000/payment/cancel}
  webhook-url: ${PAYOS_WEBHOOK_URL:https://your-ngrok.ngrok-free.app/api/payment/payos/webhook}
