version: '3.8'

networks:
  culture-quest-net:
    driver: bridge

volumes:
  postgres_data:

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: culture-quest-lite
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - culture-quest-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: culture-quest-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KC_PORT}:8080"
      - "9000:9000"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command:
      - start-dev
      - --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - culture-quest-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: culture-quest-backend:latest
    container_name: culture-quest-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      IDP_URL: http://keycloak:8080
      ISSUER_URI: http://keycloak:8080/realms/${REALM}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/${REALM:-culture-quest-lite}/protocol/openid-connect/certs
    ports:
      - "${PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - culture-quest-net
    volumes:
      - ./src/main/resources/firebase-service-account.json:/app/firebase-service-account.json:ro
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s