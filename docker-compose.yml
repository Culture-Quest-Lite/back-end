version: '3.8'

networks:
  culture-quest-net:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: culture-quest-lite
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-back-end}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - culture-quest-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-back-end}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: culture-quest-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-back-end}
      KC_DB_USERNAME: ${DB_USER:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:-123456}
      KC_MIGRATION_STRATEGY: OVERWRITE_EXISTING
      KC_FEATURES: scripts
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KC_PORT:-8081}:8080"
      - "9000:9000"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command:
      - start-dev
      - --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - culture-quest-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: culture-quest-backend:latest
    container_name: culture-quest-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      IDP_URL: http://keycloak:8081
      ISSUER_URI: http://keycloak:8081/realms/${REALM:-culture-quest-lite}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - culture-quest-net
    volumes:
      - ./src/main/resources/firebase-service-account.json:/app/firebase-service-account.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s